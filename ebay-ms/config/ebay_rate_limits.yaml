# eBay API 每日限流配置
# 参考：https://developer.ebay.com/api-docs/common/rate-limits.html
#
# 格式：endpoint_prefix → daily_limit (int)
# 前缀匹配，精确的放在前面，模糊的放后面

# ── Sell Inventory API ──────────────────────────────────────
POST /sell/inventory/v1/inventory_item: 10000   # 创建/更新库存商品
GET /sell/inventory/v1/inventory_item: 10000      # 获取库存商品
GET /sell/inventory/v1/inventory_item/: 10000   # 获取单个商品
PUT /sell/inventory/v1/inventory_item/: 10000   # 更新单个商品
DELETE /sell/inventory/v1/inventory_item/: 10000 # 删除库存商品

# ── Sell Fulfillment API ────────────────────────────────────
GET /sell/fulfillment/v1/order: 10000           # 获取订单列表
GET /sell/fulfillment/v1/order/: 10000           # 获取单个订单

# ── Sell Account API ───────────────────────────────────────
GET /sell/account/v1/: 5000                       # 账户信息

# ── Sell Finances API ───────────────────────────────────────
GET /sell/finances/v1/: 5000                      # 财务流水

# ── Browse API (Application Token) ─────────────────────────
GET /buy/browse/v1/: 5000                         # 商品搜索
GET /buy/deal/v1/: 5000                           # Deal API

# ── Marketing API ───────────────────────────────────────────
GET /sell/marketing/v1/: 5000
POST /sell/marketing/v1/: 5000

# ── 多用途默认值（未匹配以上前缀时使用）────────────────────
DEFAULT_DAILY_LIMIT: 5000
