name: eBay Listing Publish

on:
  workflow_dispatch:

jobs:
  publish-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─── Step 1-3: 运行 main.py ───────────────────
      - name: Install dependencies
        run: pip install requests openpyxl flask pandas pyyaml click rich Pillow
        working-directory: src/listing-system

      - name: Run listing (Steps 1-4)
        working-directory: src/listing-system
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_APP_SECRET: ${{ secrets.EBAY_APP_SECRET }}
          EBAY_USER_TOKEN: ${{ secrets.EBAY_USER_TOKEN }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          EBAY_ENVIRONMENT: production
        run: |
          echo "=== Running main.py ==="
          python main.py
          echo "Exit code: $?"

      # ─── Step 5: 生成 Listing HTML ─────────────────
      - name: Generate listing HTML
        working-directory: src/listing-system
        run: |
          # Generate a simple listing summary HTML from the Excel results
          python3 -c "
import openpyxl
from datetime import datetime
wb = openpyxl.load_workbook('商品数据.xlsx')
ws = wb.active
rows = list(ws.iter_rows(values_only=True))
headers = rows[0] if rows else []
html = '''<!DOCTYPE html>
<html><head><meta charset=\"UTF-8\"><title>Listing Report</title>
<style>
body { font-family: sans-serif; padding: 20px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background: #f5f5f5; }
.success { color: green; }
.failed { color: red; }
</style></head>
<body>
<h1>Listing Report - ''' + datetime.now().strftime('%Y-%m-%d %H:%M') + '''</h1>
<table><tr>'''
for h in headers[:10]:
    html += f'<th>{h}</th>'
html += '</tr>'
for row in rows[1:]:
    if row[0]:
        status = str(row[15]) if len(row) > 15 else ''
        cls = 'success' if 'SUCCESS' in status else 'failed'
        html += '<tr>'
        for val in row[:10]:
            html += f'<td class=\"{cls}\">{val}</td>'
        html += '</tr>'
html += '</table></body></html>'
with open('output/listing_report.html', 'w', encoding='utf-8') as f:
    f.write(html)
print('Generated listing_report.html')
"

      # ─── Step 6: 上传到 Google Drive ─────────────────
      - name: Upload to Google Drive
        env:
          MATON_API_KEY: ${{ secrets.MATON_API_KEY }}
        run: |
          pip install requests
          cd /tmp
          python3 -c "
import os, sys, json, urllib.request, urllib.parse

key = os.environ.get('MATON_API_KEY', '')
folder_id = '15h280yccE1bN4gzTuAM-QlxI1sCRqdGu'  # listing folder
gateway = 'https://gateway.maton.ai/google-drive'

def upload_file(path, name):
    if not os.path.exists(path):
        print(f'SKIP (not found): {path}')
        return
    size = os.path.getsize(path)
    ext = os.path.splitext(path)[1].lower()
    mime = {'.xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            '.html': 'text/html', '.json': 'application/json'}.get(ext, 'application/octet-stream')

    with open(path, 'rb') as f:
        data = f.read()

    metadata = json.dumps({'name': name, 'parents': [folder_id]}).encode()
    boundary = '----FormBoundary7MA4YWxk'
    body = (f'--{boundary}\r\nContent-Type: application/json\r\n\r\n').encode()
    body += metadata + f'\r\n--{boundary}\r\n'.encode()
    body += f'Content-Type: {mime}\r\n\r\n'.encode() + data + f'\r\n--{boundary}--\r\n'.encode()

    req = urllib.request.Request(
        f'{gateway}/upload/drive/v3/files?uploadType=multipart',
        data=body, method='POST'
    )
    req.add_header('Authorization', f'Bearer {key}')
    req.add_header('Content-Type', f'multipart/related; boundary={boundary}')
    try:
        resp = urllib.request.urlopen(req)
        result = json.load(resp)
        print(f'UPLOADED: {name} -> {result.get(\"id\")}')
    except Exception as e:
        print(f'FAILED: {name} -> {e}')

# Upload Excel results
upload_file('/home/runner/work/ebay-project/ebay-project/src/listing-system/商品数据.xlsx',
            f'商品数据_结果.xlsx')

# Upload listing HTML
import glob
for f in glob.glob('/home/runner/work/ebay-project/ebay-project/src/listing-system/output/*.html'):
    upload_file(f, os.path.basename(f))
"

      # ─── 推送更新后的 Excel 回 GitHub ─────────────────
      - name: Commit updated Excel
        run: |
          cd /home/runner/work/ebay-project/ebay-project
          git config user.email "iron@openclaw.ai"
          git config user.name "Iron Bot"
          git add src/listing-system/商品数据.xlsx
          git diff --cached --quiet || (git commit -m "chore: update listing results $(date +%Y-%m-%d)" && git push)
