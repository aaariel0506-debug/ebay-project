name: eBay Listing Publish

on:
  push:
    branches:
      - main

jobs:
  publish-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create config.json
        working-directory: src/listing-system
        run: |
          python3 -c "
import json, os
config = {
    'environment': 'production',
    'production': {'api_base': 'https://api.ebay.com', 'web_base': 'https://www.ebay.com'},
    'sandbox': {'api_base': 'https://api.sandbox.ebay.com', 'web_base': 'https://www.sandbox.ebay.com'},
    'marketplace': {'marketplace_id': 'EBAY_US', 'currency': 'USD'},
    'oauth': {
        'user_token': os.environ.get('EBAY_USER_TOKEN', ''),
        'refresh_token': os.environ.get('EBAY_REFRESH_TOKEN', '')
    },
    'business_policies': {
        'payment_policy_id': '265656298018',
        'fulfillment_policy_id': '266026679018',
        'return_policy_id': '265656303018'
    },
    'listing_defaults': {
        'auto_publish': False,
        'condition': 'NEW',
        'condition_id': '1000',
        'format': 'FIXED_PRICE'
    }
}
with open('config.json', 'w') as f:
    json.dump(config, f, indent=2, ensure_ascii=False)
print('config.json created')
"
        env:
          EBAY_USER_TOKEN: ${{ secrets.EBAY_USER_TOKEN }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}

      - name: Install dependencies
        run: pip install requests openpyxl flask pandas pyyaml click rich Pillow
        working-directory: src/listing-system

      - name: Run main.py
        working-directory: src/listing-system
        run: python main.py

      - name: Upload to Google Drive
        env:
          MATON_API_KEY: ${{ secrets.MATON_API_KEY }}
        run: pip install requests 2>/dev/null && python3 src/listing-system/scripts/upload_drive.py

      - name: Commit results
        run: |
          git config user.email "iron@openclaw.ai"
          git config user.name "Iron Bot"
          git add src/listing-system/商品数据.xlsx
          git diff --cached --quiet || (git commit -m "chore: update listing results" && git push)
