name: CI

on:
  push:
    branches: [main]
    paths:
      - "ebay-ms/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ebay-ms/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check ebay-ms/ --target-version py311 --select E,F,W,I --ignore E501

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: ebay-ms
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: ebay-ms
        run: PYTHONPATH=. pytest tests/ -v --tb=short
